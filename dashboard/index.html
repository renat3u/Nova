<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nova 控制台</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
</head>
<body>
  <div id="app">
    <!-- 顶栏 -->
    <header class="topbar">
      <span class="topbar-title">NOVA 控制台</span>
      <span class="topbar-status" id="topbar-status">● 初始化中</span>
      <div class="topbar-actions">
        <button id="btn-theme" class="btn-icon" title="切换主题">🌓</button>
        <button id="btn-settings-nav" class="btn-icon" title="设置">⚙</button>
      </div>
    </header>

    <div class="layout">
      <!-- 导航 -->
      <nav class="sidebar" id="sidebar">
        <button class="nav-btn active" data-panel="dashboard">仪表盘</button>
        <button class="nav-btn" data-panel="chat">聊天</button>
        <button class="nav-btn" data-panel="settings">设置</button>
      </nav>

      <!-- 主内容 -->
      <main class="main-content" id="main-content">
        <!-- 仪表盘 -->
        <section class="panel active" id="panel-dashboard">
          <div class="status-bar" id="status-bar"></div>
          <div class="dashboard-toolbar">
            <button id="btn-start-core" class="btn-success">启动 Core</button>
            <button id="btn-stop-core" class="btn-danger-outline">停止 Core</button>
            <span class="toolbar-separator">|</span>
            <label class="auto-stop-label">
              <input type="number" id="input-auto-stop-tick" value="200"
                     min="0" step="10" class="auto-stop-input">
              tick 后自动停止
            </label>
            <span id="auto-stop-status" class="auto-stop-status"></span>
            <span class="toolbar-separator">|</span>
            <button id="btn-new-session" class="btn-danger-outline">新会话</button>
            <span class="toolbar-hint">删除旧记忆，以全新身份开始</span>
          </div>
          <div class="dashboard-grid">
            <div class="card card-wide" id="card-pressure-params">
              <h3>压力参数
                <button id="btn-reset-kappas" class="btn-text" style="margin-left:8px;font-size:11px" title="重置所有手动覆盖的压力值">重置覆盖</button>
              </h3>
              <div class="pressure-params" id="pressure-params"></div>
            </div>
            <div class="card card-wide" id="card-pressure-timeline">
              <h3>压力时序</h3>
              <div class="time-range-selector">
                <button class="range-btn active" data-range="5m">5分</button>
                <button class="range-btn" data-range="15m">15分</button>
                <button class="range-btn" data-range="1h">1时</button>
              </div>
              <div class="chart-container" id="chart-pressure-timeline"></div>
            </div>
            <div class="card" id="card-traces">
              <h3>决策追溯</h3>
              <div class="trace-list" id="trace-list"></div>
            </div>
            <div class="card" id="card-actions">
              <h3>动作日志</h3>
              <div class="action-timeline" id="action-timeline"></div>
            </div>
            <div class="card" id="card-deliberations">
              <h3>审议摘要</h3>
              <div class="deliberation-list" id="deliberation-list"></div>
            </div>
          </div>
        </section>

        <!-- 聊天 + 日志（左右分栏） -->
        <section class="panel" id="panel-chat">
          <div class="chat-split">
            <!-- 左：运行日志 -->
            <div class="log-panel" id="log-panel">
              <div class="log-header">
                <span>运行日志</span>
                <button id="btn-clear-log" class="btn-text">清空</button>
              </div>
              <div class="log-output" id="log-output">
                <div class="chat-empty">等待日志输出...</div>
              </div>
            </div>
            <!-- 右：聊天 -->
            <div class="chat-container">
              <div class="chat-header">
                <span>与 Nova 对话</span>
                <button id="btn-clear-chat" class="btn-text">清空记录</button>
              </div>
              <div class="chat-messages" id="chat-messages">
                <div class="chat-empty">开始和 Nova 聊天吧...</div>
              </div>
              <div class="chat-input-area">
                <textarea id="chat-input" placeholder="输入消息..." rows="2"></textarea>
                <button id="btn-send" class="btn-primary">发送</button>
              </div>
            </div>
          </div>
        </section>

        <!-- 设置 -->
        <section class="panel" id="panel-settings">
          <div class="settings-container">
            <h2>设置</h2>

            <div class="setting-group">
              <h4>用户身份</h4>
              <div class="setting-row">
                <label for="setting-username">显示名称</label>
                <input type="text" id="setting-username" placeholder="爱丽丝" maxlength="32">
              </div>
              <div class="setting-row">
                <label>用户 ID</label>
                <span class="setting-readonly" id="setting-userid">—</span>
              </div>
              <div class="setting-row">
                <span class="setting-hint">用户 ID 由服务端每次启动时分配，重启后为新会话</span>
              </div>
            </div>

            <div class="setting-group">
              <h4>外观</h4>
              <div class="setting-row">
                <label for="setting-theme">主题</label>
                <select id="setting-theme">
                  <option value="light">浅色</option>
                  <option value="dark">深色</option>
                </select>
              </div>
              <div class="setting-row">
                <label for="setting-timestamps">显示时间戳</label>
                <input type="checkbox" id="setting-timestamps" checked>
              </div>
              <div class="setting-row">
                <label for="setting-autoscroll">自动滚动聊天</label>
                <input type="checkbox" id="setting-autoscroll" checked>
              </div>
              <div class="setting-row">
                <label for="setting-autoscroll-log">自动滚动日志</label>
                <input type="checkbox" id="setting-autoscroll-log" checked>
              </div>
            </div>

            <div class="setting-group">
              <h4>主动行为</h4>
              <div class="setting-row">
                <label for="setting-proactive">启用主动消息</label>
                <input type="checkbox" id="setting-proactive">
              </div>
              <div class="setting-row">
                <span class="setting-hint">
                  开启后，Nova 可能在无新消息时主动联系你。
                  在 standalone 模式下建议关闭，避免无意义的 LLM 调用。
                </span>
              </div>
            </div>

            <div class="setting-group">
              <h4>数据</h4>
              <div class="setting-row">
                <button id="btn-clear-history" class="btn-danger">清除聊天记录</button>
              </div>
            </div>
          </div>
        </section>
      </main>
    </div>
  </div>

  <script src="js/api-client.js"></script>
  <script src="js/ws-client.js"></script>
  <script src="js/panels/status.js"></script>
  <script src="js/panels/pressure.js"></script>
  <script src="js/panels/traces.js"></script>
  <script src="js/panels/actions.js"></script>
  <script src="js/panels/logs.js"></script>
  <script src="js/panels/chat.js"></script>
  <script src="js/panels/settings.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
